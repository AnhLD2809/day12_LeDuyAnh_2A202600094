version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: llm_redis
    restart: always

  agent:
    build:
      context: .
      dockerfile: Dockerfile
    restart: always
    deploy:
      replicas: 3
    env_file:
      - .env
    environment:
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - redis

  nginx:
    image: nginx:alpine
    container_name: llm_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - agent