events {
    # Cấu hình số lượng kết nối tối đa mỗi worker
    worker_connections 1024;
}

http {
    # Định nghĩa cụm server backend
    upstream agent_cluster {
        # 'agent' chính là tên service trong docker-compose.yml.
        # Docker's internal DNS sẽ tự động phân giải tên 'agent' ra IP của cả 3 container.
        server agent:8000;
    }

    server {
        listen 80;

        location / {
            # Chuyển tiếp request tới cụm agent_cluster
            proxy_pass http://agent_cluster;
            
            # Giữ nguyên các header quan trọng từ client thực sự
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}